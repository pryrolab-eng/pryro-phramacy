<!DOCTYPE html>
<html>
<head>
    <title>Check User Info</title>
</head>
<body>
    <h1>Check Current User</h1>
    <button onclick="checkUser()">Check User & Role</button>
    <button onclick="testAddInsurance()">Test Add Insurance</button>
    <pre id="result"></pre>

    <script>
        async function checkUser() {
            const result = document.getElementById('result');
            result.textContent = 'Checking...';

            try {
                const response = await fetch('/api/insurance');
                const data = await response.json();
                result.textContent = 'GET Insurance:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function testAddInsurance() {
            const result = document.getElementById('result');
            result.textContent = 'Adding insurance...';

            try {
                const response = await fetch('/api/insurance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test Insurance ' + Date.now(),
                        coverage_percentage: 85
                    })
                });

                const data = await response.json();
                result.textContent = 'Status: ' + response.status + '\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
