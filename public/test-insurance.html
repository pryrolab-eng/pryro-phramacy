<!DOCTYPE html>
<html>
<head>
    <title>Test Insurance API</title>
</head>
<body>
    <h1>Test Add Insurance Provider</h1>
    <button onclick="testAddInsurance()">Add Test Insurance</button>
    <pre id="result"></pre>

    <script>
        async function testAddInsurance() {
            const result = document.getElementById('result');
            result.textContent = 'Testing...';

            try {
                const response = await fetch('/api/insurance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'Test Insurance Provider',
                        coverage_percentage: 85,
                        contact_email: 'test@insurance.com',
                        contact_phone: '+1234567890'
                    })
                });

                const data = await response.json();
                result.textContent = JSON.stringify({
                    status: response.status,
                    data: data
                }, null, 2);
            } catch (error) {
                result.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
