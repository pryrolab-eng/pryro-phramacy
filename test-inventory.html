<!DOCTYPE html>
<html>
<head>
    <title>Inventory Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 200px; padding: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Inventory Add Product Test</h1>
    
    <form id="productForm">
        <div class="form-group">
            <label>Product Name:</label>
            <input type="text" id="name" value="Test Paracetamol 500mg" required>
        </div>
        
        <div class="form-group">
            <label>Category:</label>
            <select id="category" required>
                <option value="Pain Relief">Pain Relief</option>
                <option value="Antibiotics">Antibiotics</option>
                <option value="Vitamins">Vitamins</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Batch Number:</label>
            <input type="text" id="batchNumber" value="TEST001" required>
        </div>
        
        <div class="form-group">
            <label>Stock Quantity:</label>
            <input type="number" id="stock" value="100" required>
        </div>
        
        <div class="form-group">
            <label>Purchase Price (RWF):</label>
            <input type="number" id="purchasePrice" value="400" required>
        </div>
        
        <div class="form-group">
            <label>Selling Price (RWF):</label>
            <input type="number" id="price" value="500" required>
        </div>
        
        <div class="form-group">
            <label>Minimum Stock:</label>
            <input type="number" id="minStock" value="20" required>
        </div>
        
        <div class="form-group">
            <label>Expiry Date:</label>
            <input type="date" id="expiryDate" value="2025-12-31" required>
        </div>
        
        <button type="submit">Add Product</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                batch_number: document.getElementById('batchNumber').value,
                quantity: document.getElementById('stock').value,
                unit_cost: document.getElementById('purchasePrice').value,
                selling_price: document.getElementById('price').value,
                minimum_stock_level: document.getElementById('minStock').value,
                expiry_date: document.getElementById('expiryDate').value
            };
            
            console.log('Form Data:', formData);
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Testing form submission...<br><pre>' + JSON.stringify(formData, null, 2) + '</pre>';
            
            try {
                const response = await fetch('/api/inventory/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                resultDiv.innerHTML += '<br><strong>API Response:</strong><br>' + 
                    'Status: ' + response.status + '<br>' +
                    'Result: <pre>' + JSON.stringify(result, null, 2) + '</pre>';
                    
                if (result.success) {
                    resultDiv.style.background = '#d4edda';
                    resultDiv.innerHTML += '<br>✅ Product added successfully!';
                } else {
                    resultDiv.style.background = '#f8d7da';
                    resultDiv.innerHTML += '<br>❌ Error: ' + result.error;
                }
                
            } catch (error) {
                resultDiv.style.background = '#f8d7da';
                resultDiv.innerHTML += '<br>❌ Network Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
